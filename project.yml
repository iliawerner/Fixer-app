name: Fixer
options:
  bundleIdPrefix: com.geminimacros
  deploymentTarget:
    macOS: 13.0

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: 2.2.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2

targets:
  # Project, target, and scheme are named "Fixer". The bundle id is pinned
  # explicitly to com.geminimacros.GeminiMacros (see PRODUCT_BUNDLE_IDENTIFIER
  # below) rather than derived from the target name, so it stays stable and keeps
  # the saved API key (Keychain) and saved actions (UserDefaults) working across
  # the rename. The built product is "fixer" via PRODUCT_NAME.
  Fixer:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: fixer.icon
        type: file
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: fixer
        NSHumanReadableCopyright: "© 2026 fixer"
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
    dependencies:
      - package: KeyboardShortcuts
      - package: KeychainAccess
    settings:
      PRODUCT_NAME: fixer
      PRODUCT_BUNDLE_IDENTIFIER: com.geminimacros.GeminiMacros # pinned for Keychain/UserDefaults continuity — do NOT change
      CODE_SIGN_IDENTITY: "-" # Ad-hoc sign for local build
      ENABLE_HARDENED_RUNTIME: false # Easier debugging locally without sandbox
      ASSETCATALOG_COMPILER_APPICON_NAME: fixer
      COMBINE_HIDPI_IMAGES: true

  # Unit tests. Hosted in the app (TEST_HOST) so `@testable import fixer` works
  # without recompiling Sources or re-adding the packages to this target.
  FixerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Fixer
    settings:
      # PRODUCT_NAME on the app is "fixer", so the host app/executable are fixer.app/fixer.
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/fixer.app/Contents/MacOS/fixer"
      BUNDLE_LOADER: "$(TEST_HOST)"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_IDENTITY: "-"

schemes:
  Fixer:
    build:
      targets:
        Fixer: all
        FixerTests: [test]
    test:
      targets:
        - FixerTests
