name: GeminiMacros
options:
  bundleIdPrefix: com.geminimacros
  deploymentTarget:
    macOS: 13.0

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: 2.2.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2

targets:
  # Target key kept as "GeminiMacros" so the bundle id (com.geminimacros.GeminiMacros)
  # stays stable — that preserves the saved API key (Keychain) and saved actions
  # (UserDefaults). The user-facing product is renamed to "fixer" via PRODUCT_NAME.
  GeminiMacros:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: fixer.icon
        type: file
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: fixer
        NSHumanReadableCopyright: "© 2026 fixer"
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
    dependencies:
      - package: KeyboardShortcuts
      - package: KeychainAccess
    settings:
      PRODUCT_NAME: fixer
      CODE_SIGN_IDENTITY: "-" # Ad-hoc sign for local build
      ENABLE_HARDENED_RUNTIME: false # Easier debugging locally without sandbox
      ASSETCATALOG_COMPILER_APPICON_NAME: fixer
      COMBINE_HIDPI_IMAGES: true
